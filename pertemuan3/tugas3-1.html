<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Tugas Praktikum 3.1</title>
    <link rel="stylesheet" href="tugas3-1.css">
</head>

<body>
    <header>
        <h1>Selamat Datang di Website Sederhana</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Layanan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <div class="container-utama">

        <div class="form-section">
            <h2>Formulir Pendaftaran</h2>
            <p>Silakan isi formulir di bawah ini untuk mendaftar.</p>

            <form action="#">
                <label for="nama">Nama Lengkap:</label>
                <input type="text" id="nama" name="namalengkap">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

                <label for="password">Password:</label>
                <input type="password" id="password" name="password">

                <p class="label-judul"><strong>Jenis Kelamin:</strong></p>

                <div class="pilihan-row">
                    <label for="laki">Laki-laki</label>
                    <input type="radio" id="laki" name="jenis_kelamin" value="Laki-Laki">
                </div>
                <div class="pilihan-row">
                    <label for="perempuan">Perempuan</label>
                    <input type="radio" id="perempuan" name="jenis_kelamin" value="Perempuan">
                </div>

                <hr class="garis-pembatas">

                <p class="label-judul"><strong>Hobi:</strong></p>

                <div class="pilihan-row">
                    <label for="musik">Musik</label>
                    <input type="checkbox" id="musik" name="hobi" value="Musik">
                </div>
                <div class="pilihan-row">
                    <label for="olahraga">Olahraga</label>
                    <input type="checkbox" id="olahraga" name="hobi" value="Olahraga">
                </div>
                <div class="pilihan-row">
                    <label for="membaca">Membaca</label>
                    <input type="checkbox" id="membaca" name="hobi" value="Membaca">
                </div>

                <hr class="garis-pembatas">

                <label for="kota">Pilih Kota:</label>
                <select id="kota" name="pilihan">
                    <option value="Jakarta">Jakarta</option>
                    <option value="Bandung">Bandung</option>
                    <option value="Surabaya">Surabaya</option>
                </select>

                <label for="pesan">Pesan Tambahan:</label>
                <textarea id="pesan" name="pesan_tambahan" placeholder="Tulis pesan di sini..."></textarea>

                <button type="submit" class="btn">Kirim</button>
            </form>
        </div>

        <div class="sidebar">
            <h2>Sidebar</h2>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </div>

    </div>

    <footer>
</body>

</html>
